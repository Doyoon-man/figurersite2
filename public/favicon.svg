<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 배경 그라데이션 -->
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </radialGradient>

    <!-- 피부 그라데이션 -->
    <radialGradient id="skinGrad" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5ede8"/>
      <stop offset="100%" stop-color="#e8d5cc"/>
    </radialGradient>

    <!-- 머리카락 그라데이션 -->
    <linearGradient id="hairGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="50%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- 머리카락 하이라이트 -->
    <linearGradient id="hairHighlight" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#6a6a6a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3a3a3a" stop-opacity="0"/>
    </linearGradient>

    <!-- 눈 그라데이션 (보라) -->
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9b7ec8"/>
      <stop offset="50%" stop-color="#7c5ba8"/>
      <stop offset="100%" stop-color="#4a3070"/>
    </radialGradient>

    <!-- 눈 글로우 -->
    <radialGradient id="eyeGlow" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#c9a8e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c5ba8" stop-opacity="0"/>
    </radialGradient>

    <!-- 귀걸이 별 글로우 -->
    <radialGradient id="starGlowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e0d0ff"/>
      <stop offset="100%" stop-color="#9b7ec8" stop-opacity="0"/>
    </radialGradient>

    <!-- 소프트 글로우 필터 -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 별 글로우 필터 -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 머리카락 그림자 필터 -->
    <filter id="hairShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- 클립 경로 (얼굴 원형) -->
    <clipPath id="faceClip">
      <ellipse cx="32" cy="30" rx="13" ry="14"/>
    </clipPath>
  </defs>

  <!-- ===== 배경 (둥근 사각형) ===== -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- 배경 미묘한 텍스처 느낌 -->
  <circle cx="32" cy="32" r="30" fill="#d8d8d8" opacity="0.3"/>

  <!-- ===== 목 ===== -->
  <rect x="27" y="43" width="10" height="10" rx="2" fill="url(#skinGrad)"/>
  <!-- 목 그림자 -->
  <rect x="27" y="43" width="10" height="4" rx="1" fill="#d4bfb8" opacity="0.5"/>

  <!-- ===== 옷 (블랙 탑) ===== -->
  <path d="M12 64 Q16 50 27 48 L32 52 L37 48 Q48 50 52 64 Z" fill="#1a1a1a"/>
  <!-- 옷 하이라이트 -->
  <path d="M27 48 L32 52 L37 48 Q38 50 37 52 L32 55 L27 52 Q26 50 27 48Z" fill="#2a2a2a" opacity="0.7"/>

  <!-- 어깨 라인 -->
  <path d="M14 64 Q18 54 28 50" stroke="#111" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M50 64 Q46 54 36 50" stroke="#111" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- ===== 얼굴 베이스 ===== -->
  <ellipse cx="32" cy="30" rx="13" ry="14" fill="url(#skinGrad)"/>

  <!-- 얼굴 측면 그림자 (입체감) -->
  <ellipse cx="20" cy="30" rx="4" ry="8" fill="#c9a898" opacity="0.25"/>
  <ellipse cx="44" cy="30" rx="4" ry="8" fill="#c9a898" opacity="0.2"/>

  <!-- ===== 귀 ===== -->
  <!-- 오른쪽 귀 (오른편) -->
  <ellipse cx="45" cy="30" rx="2.5" ry="3.5" fill="#edd8cc"/>
  <ellipse cx="45.5" cy="30" rx="1.5" ry="2.2" fill="#e0c5ba"/>

  <!-- 왼쪽 귀 -->
  <ellipse cx="19" cy="30" rx="2.5" ry="3.5" fill="#edd8cc"/>
  <ellipse cx="18.5" cy="30" rx="1.5" ry="2.2" fill="#e0c5ba"/>

  <!-- ===== 별 귀걸이 (오른쪽 귀 아래) ===== -->
  <g filter="url(#starGlow)" transform="translate(45, 35)">
    <!-- 귀걸이 작은 원 -->
    <circle cx="0" cy="-1" r="1.2" fill="#ccc" stroke="#aaa" stroke-width="0.3"/>
    <!-- 별 -->
    <polygon points="0,-3.5 0.8,-1.3 3,-1.3 1.3,0.2 1.9,2.4 0,1.1 -1.9,2.4 -1.3,0.2 -3,-1.3 -0.8,-1.3"
      fill="url(#starGlowGrad)" transform="scale(0.85) translate(0, 2)"/>
    <!-- 별 외곽선 -->
    <polygon points="0,-3 0.7,-1.1 2.6,-1.1 1.1,0.1 1.7,2.1 0,0.9 -1.7,2.1 -1.1,0.1 -2.6,-1.1 -0.7,-1.1"
      fill="none" stroke="#d0c0ff" stroke-width="0.3" opacity="0.7" transform="scale(0.85) translate(0, 2)"/>
  </g>

  <!-- ===== 머리카락 (뒷부분) ===== -->
  <!-- 뒷머리 -->
  <ellipse cx="32" cy="22" rx="15" ry="15" fill="url(#hairGrad)" filter="url(#hairShadow)"/>
  <!-- 뒷머리 왼쪽 흘러내림 -->
  <path d="M18 20 Q13 28 15 40 Q18 35 20 30" fill="url(#hairGrad)"/>
  <!-- 뒷머리 오른쪽 흘러내림 -->
  <path d="M46 20 Q51 28 49 40 Q46 35 44 30" fill="url(#hairGrad)"/>

  <!-- ===== 얼굴 다시 그리기 (머리카락 위에) ===== -->
  <ellipse cx="32" cy="30" rx="12.5" ry="13" fill="url(#skinGrad)"/>

  <!-- 귀 다시 (머리카락 위에) -->
  <ellipse cx="44.5" cy="30" rx="2.2" ry="3" fill="#edd8cc"/>
  <ellipse cx="19.5" cy="30" rx="2.2" ry="3" fill="#edd8cc"/>

  <!-- 귀 내부 -->
  <ellipse cx="44.8" cy="30" rx="1.2" ry="1.8" fill="#e0c5ba"/>
  <ellipse cx="19.2" cy="30" rx="1.2" ry="1.8" fill="#e0c5ba"/>

  <!-- ===== 앞머리 ===== -->
  <!-- 앞머리 메인 -->
  <path d="M19 23 Q20 12 32 11 Q44 12 45 23 Q41 18 36 17 Q32 16 28 17 Q23 18 19 23 Z"
    fill="url(#hairGrad)"/>
  <!-- 앞머리 하이라이트 -->
  <path d="M22 18 Q28 13 37 15 Q30 13 22 18Z" fill="url(#hairHighlight)" opacity="0.7"/>

  <!-- 앞머리 결 (얼굴 위로 내려오는 머리카락) -->
  <!-- 왼쪽 사이드 뱅 -->
  <path d="M19 23 Q17 28 18 35 Q20 30 21 25" fill="url(#hairGrad)"/>
  <!-- 오른쪽 사이드 뱅 -->
  <path d="M45 23 Q47 28 46 35 Q44 30 43 25" fill="url(#hairGrad)"/>

  <!-- 뱅 앞머리 개별 가닥 -->
  <path d="M24 15 Q22 20 23 26" stroke="#3a3a3a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M28 13 Q27 19 28 24" stroke="#3a3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M32 12 Q32 18 32 23" stroke="#3a3a3a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M36 13 Q37 19 36 24" stroke="#3a3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M40 15 Q42 20 41 26" stroke="#3a3a3a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 앞머리 앞 레이어 (진하게) -->
  <path d="M24 17 Q21 22 22 28 Q24 24 25 20Z" fill="#2a2a2a" opacity="0.6"/>
  <path d="M40 17 Q43 22 42 28 Q40 24 39 20Z" fill="#2a2a2a" opacity="0.6"/>

  <!-- ===== 눈썹 ===== -->
  <!-- 왼쪽 눈썹 (약간 인상있게) -->
  <path d="M22 23.5 Q25.5 21.5 28.5 22.5" stroke="#2e2e2e" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 오른쪽 눈썹 -->
  <path d="M35.5 22.5 Q38.5 21.5 42 23.5" stroke="#2e2e2e" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- ===== 눈 ===== -->
  <!-- 눈 외곽 (상단 눈꺼풀 라인) -->
  <!-- 왼쪽 눈 -->
  <path d="M22 27 Q25 25.5 29 27 Q28 31 25.5 31.5 Q23 31 22 27Z" fill="#1a1a1a"/>
  <ellipse cx="25.5" cy="28.5" rx="3" ry="2.8" fill="url(#eyeGrad)"/>
  <ellipse cx="25.5" cy="28.5" rx="2" ry="2" fill="url(#eyeGlow)" opacity="0.8"/>
  <!-- 동공 -->
  <circle cx="25.5" cy="28.8" r="1.2" fill="#1a0a28"/>
  <!-- 눈 하이라이트 -->
  <circle cx="24.5" cy="27.5" r="0.9" fill="white" opacity="0.95"/>
  <circle cx="26.8" cy="29.8" r="0.5" fill="white" opacity="0.5"/>
  <!-- 눈꺼풀 라인 -->
  <path d="M22 27 Q25.5 25 29 27" stroke="#1a1a1a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 속눈썹 -->
  <line x1="22.5" y1="27.2" x2="21.8" y2="26" stroke="#1a1a1a" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="28.5" y1="27.2" x2="29.3" y2="26" stroke="#1a1a1a" stroke-width="0.5" stroke-linecap="round"/>
  <!-- 하단 눈꺼풀 -->
  <path d="M22.5 29.5 Q25.5 31.5 28.5 29.5" stroke="#9b7ec8" stroke-width="0.4" fill="none" opacity="0.6"/>

  <!-- 오른쪽 눈 -->
  <path d="M35 27 Q38.5 25.5 42 27 Q41 31 38.5 31.5 Q36 31 35 27Z" fill="#1a1a1a"/>
  <ellipse cx="38.5" cy="28.5" rx="3" ry="2.8" fill="url(#eyeGrad)"/>
  <ellipse cx="38.5" cy="28.5" rx="2" ry="2" fill="url(#eyeGlow)" opacity="0.8"/>
  <!-- 동공 -->
  <circle cx="38.5" cy="28.8" r="1.2" fill="#1a0a28"/>
  <!-- 눈 하이라이트 -->
  <circle cx="37.5" cy="27.5" r="0.9" fill="white" opacity="0.95"/>
  <circle cx="39.8" cy="29.8" r="0.5" fill="white" opacity="0.5"/>
  <!-- 눈꺼풀 라인 -->
  <path d="M35 27 Q38.5 25 42 27" stroke="#1a1a1a" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 속눈썹 -->
  <line x1="35.5" y1="27.2" x2="34.8" y2="26" stroke="#1a1a1a" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="41.5" y1="27.2" x2="42.3" y2="26" stroke="#1a1a1a" stroke-width="0.5" stroke-linecap="round"/>
  <!-- 하단 눈꺼풀 -->
  <path d="M35.5 29.5 Q38.5 31.5 41.5 29.5" stroke="#9b7ec8" stroke-width="0.4" fill="none" opacity="0.6"/>

  <!-- ===== 코 ===== -->
  <path d="M31.5 33 Q32 34 32.5 33" stroke="#c9a898" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ===== 입 (잔잔한 미소) ===== -->
  <path d="M28.5 37 Q32 39 35.5 37" stroke="#c08080" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <!-- 아랫입술 볼륨 -->
  <path d="M29.5 37.5 Q32 39.5 34.5 37.5" stroke="#d4a0a0" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- ===== 볼 홍조 ===== -->
  <ellipse cx="21.5" cy="33" rx="3.5" ry="1.5" fill="#f0a0a0" opacity="0.2"/>
  <ellipse cx="42.5" cy="33" rx="3.5" ry="1.5" fill="#f0a0a0" opacity="0.2"/>

  <!-- ===== 별 귀걸이 재렌더 (맨 위에) ===== -->
  <g filter="url(#starGlow)">
    <!-- 귀걸이 줄 -->
    <line x1="45" y1="33" x2="45" y2="36" stroke="#aaa" stroke-width="0.5"/>
    <!-- 별 귀걸이 -->
    <polygon points="45,36 45.5,37.5 47,37.5 45.9,38.5 46.3,40 45,39.1 43.7,40 44.1,38.5 43,37.5 44.5,37.5"
      fill="white" opacity="0.95"/>
    <polygon points="45,36 45.5,37.5 47,37.5 45.9,38.5 46.3,40 45,39.1 43.7,40 44.1,38.5 43,37.5 44.5,37.5"
      fill="#d0c8ff" opacity="0.5"/>
  </g>

  <!-- ===== 테두리 (둥근 사각형) ===== -->
  <rect width="64" height="64" rx="14" ry="14" fill="none" stroke="#999999" stroke-width="1.5" opacity="0.6"/>

  <!-- 모서리 미세한 빛 반사 -->
  <path d="M14 2 Q2 2 2 14" stroke="white" stroke-width="0.8" fill="none" opacity="0.15" stroke-linecap="round"/>
</svg>